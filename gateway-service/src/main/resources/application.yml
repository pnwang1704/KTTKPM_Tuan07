server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: user-service
          uri: http://172.16.33.142:8081
          predicates:
            - Path=/auth/**
        - id: movie-service
          uri: http://172.16.33.142:8082
          predicates:
            - Path=/movies/**
        - id: booking-service
          uri: http://172.16.40.124:8083
          predicates:
            - Path=/bookings/**
